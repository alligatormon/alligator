log_level info;
log_dest stdout;

log_channel {
    name kafka-test;
    dest kafka://127.0.0.1:9092/alligator-log-test?key=system;
    log_format json;
    log_time on;
}

entrypoint {
    tcp 1111;
    handler prometheus;
    log_channel kafka-test;
    log_level info;
}

system {
    base;
    log_channel kafka-test;
    log_level info;
}
