stages:
- tests
- build

image: centos:7.9.2009

tests:
  stage: build
  image: quay.io/centos/centos:stream9
  except:
  - tags
  script:
  - dnf install -y 'dnf-command(config-manager)'
  - dnf config-manager --set-enabled crb
  - yum -y install git cmake make libtool rake python3-pip gcc gcc-c++ systemd-devel clang go rpm-build libvirt-devel smartmontools llvm perl-FindBin  perl-Digest-SHA perl-IPC-Cmd
  - update-smart-drivedb
  - git submodule sync --recursive
  - git submodule update --init --recursive
  - cd src

  - pip3 install conan==2.26.1
  - conan profile detect --force
  - conan install . --build=missing  -s build_type=Debug
  - conan build external/

  - find . -name conan_toolchain.cmake
  - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=build/Debug/generators/conan_toolchain.cmake -DCMAKE_BUILD_TYPE=Debug
  - cmake --build build --parallel 3

  - ./build/alligator_tests pass
  - llvm-profdata merge -sparse default.profraw -o default.profdata
  - llvm-cov report -instr-profile=default.profdata build/alligator_tests

static-analyzer:
  stage: build
  image: alligatormon/clang-tidy:4
  allow_failure: true
  except:
  - tags
  script:
  - apt update
  - apt -y install git cmake make libtool rake python3-pip gcc g++ libsystemd-dev libudev-dev golang-go curl libvirt-dev smartmontools
  - update-smart-drivedb

  - git submodule sync --recursive
  - git submodule update --init --recursive
  - cd src

  - pip3 install --break-system-packages conan==2.26.1
  - mkdir -p ~/.conan/profiles/
  - conan profile detect --force
  - conan install . --build=missing  -s build_type=Debug
  - conan build external/

  - cmake -S . -B build   -DCMAKE_TOOLCHAIN_FILE=build/Debug/generators/conan_toolchain.cmake   -DCMAKE_BUILD_TYPE=Debug
  - cmake --build build --target alligator_analyze  --parallel 3

static-lint:
  image: alligatormon/clang-tidy:4
  allow_failure: true
  except:
  - tags
  stage: build
  variables:
    DEBIAN_FRONTEND: noninteractive
    TZ: Etc/UTC
  script:
  - apt update
  - apt -y install git cmake make libtool rake python3-pip gcc g++ libsystemd-dev libudev-dev golang-go curl libvirt-dev smartmontools
  - update-smart-drivedb

  - git submodule sync --recursive
  - git submodule update --init --recursive
  - cd src

  - pip3 install --break-system-packages conan==2.26.1
  - mkdir -p ~/.conan/profiles/
  - conan profile detect --force
  - conan install . --build=missing -s build_type=Debug
  - conan build external/

  - cmake -S . -B build   -DCMAKE_TOOLCHAIN_FILE=build/Debug/generators/conan_toolchain.cmake   -DCMAKE_BUILD_TYPE=Debug
  - cmake --build build --target alligator_lint  --parallel 3

memcheck:
  image: ubuntu:22.04
  except:
  - tags
  stage: build
  variables:
    DEBIAN_FRONTEND: noninteractive
    TZ: Etc/UTC
  script:
  - apt update
  - apt -y install git cmake make libtool rake python3-pip gcc g++ libsystemd-dev libudev-dev clang golang-go curl valgrind libvirt-dev smartmontools
  - update-smart-drivedb

  - git submodule sync --recursive
  - git submodule update --init --recursive
  - cd src

  - pip3 install conan==2.26.1
  - conan profile detect --force
  - conan install . --build=missing -s build_type=Debug
  - conan build external/

  - cmake -S . -B build   -DCMAKE_TOOLCHAIN_FILE=build/Debug/generators/conan_toolchain.cmake   -DCMAKE_BUILD_TYPE=Debug
  - cmake --build build  --parallel 3

  - valgrind --leak-check=full -v --track-origins=yes ./build/alligator&
  - sleep 120 && kill -TERM %1

generate-linters:
  image: docker:24.0.5
  when: manual
  services:
  - docker:24.0.5-dind
  tags:
  - saas-linux-medium-amd64
  stage: build
  interruptible: true
  script:
  - echo ${DOCKER_PASSWORD} | docker login --username $DOCKER_USER --password-stdin
  - docker build -t alligatormon/clang-tidy:latest -f misc/Dockerfile.clang-tidy .
  - docker tag alligatormon/clang-tidy:latest alligatormon/clang-tidy:$CI_PIPELINE_IID
  - docker push alligatormon/clang-tidy:$CI_PIPELINE_IID
  - docker push alligatormon/clang-tidy:latest


list_all_distributions:
  stage: build
  image: quay.io/centos/centos:stream9
  except:
  - tags
  script:
  - yum -y install jq
  - curl https://$PKGCLOUD_TOKEN:@packagecloud.io/api/v1/distributions | jq

deploy_centos7:
  stage: build
  only:
  - tags
  script:
  - sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/*.repo
  - sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/*.repo
  - sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/*.repo

  - yum -y install epel-release https://acc.dl.osdn.jp/storage/g/c/cu/cutter/centos/cutter-release-1.3.0-1.noarch.rpm
  - yum -y install git cmake3 make libtool rake python3-pip gcc gcc-c++ systemd-devel clang golang rpm-build perl-Digest-SHA perl-IPC-Cmd cutter libvirt-devel smartmontools
  - cp misc/centos7/conanfile.py src/external/conanfile.py
  - cp misc/centos7/conanfile.txt src/conanfile.txt
  - cp misc/centos7/CMakeLists.txt src/CMakeLists.txt
  - update-smart-drivedb --no-verify
  - ln -s /usr/bin/cmake3 /usr/bin/cmake
  - git submodule sync --recursive
  - git submodule update --init --recursive
  - cd src

  - cd external/libfyaml
  - git checkout v0.7.12
  - cd -

  - pip3 install conan==1.64.0
  - conan install . --build=missing
  - conan build external/

  - cmake . -DCPACK_GENERATOR=RPM
  - make -j package

  - PKGNAME=`ls alligator-$CI_COMMIT_TAG-Linux.rpm`
  - curl -F "package[distro_version_id]=140" -F "package[package_file]=@$PKGNAME" https://$PKGCLOUD_TOKEN:@packagecloud.io/api/v1/repos/amoshi/alligator/packages.json

