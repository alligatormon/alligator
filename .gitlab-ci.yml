deploy_ubuntu1604:
  image: ubuntu:16.04
  only:
  - tags
  stage: build
  variables:
    DEBIAN_FRONTEND: noninteractive
    TZ: Etc/UTC
  script:
  - for f in /etc/apt/sources.list /etc/apt/sources.list.d/*; do test -f "$f" && sed -i -e 's/archive.ubuntu.com/old-releases.ubuntu.com/g' -e 's/security.ubuntu.com/old-releases.ubuntu.com/g' "$f"; done
  - apt update
  - apt -y install ca-certificates curl wget git make libtool rake gcc g++ libsystemd-dev libudev-dev clang pkg-config libvirt-dev smartmontools python3.6 python3.6-dev
  - apt -y install --only-upgrade m4 || true
  - update-smart-drivedb --no-verify || true
  - wget -q https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-x86_64.tar.gz
  - tar -xf cmake-3.28.3-linux-x86_64.tar.gz -C /usr/local --strip-components=1
  - cp misc/centos7/conanfile.txt src/conanfile.txt
  - git submodule sync --recursive
  - git submodule update --init --recursive
  - cd src

  - cd external/libfyaml
  - git checkout v0.7.12
  - cd -

  - curl -sS https://bootstrap.pypa.io/pip/3.6/get-pip.py -o get-pip.py
  - python3.6 get-pip.py
  - python3.6 -m pip install conan==2.19.1
  - python3.6 -m conan profile detect --force

  - python3.6 -m conan install . --build=missing || true
  - ln -sf /usr/bin/m4 /root/.conan2/p/m4f50c1c1e2fee9/p/bin/m4
  - python3.6 -m conan install . --build=missing

  - python3.6 -m conan build external/
  - wget https://go.dev/dl/go1.22.1.linux-amd64.tar.gz
  - tar -C /usr/local -xzf go1.22.1.linux-amd64.tar.gz
  - ln -sf /usr/local/go/bin/go /usr/bin/go

  - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake -DCPACK_GENERATOR=DEB -DCMAKE_BUILD_TYPE=Release
  - cmake --build build --parallel 3
  - cd build
  - cpack -G DEB

  - PKGNAME=`ls alligator-$CI_COMMIT_TAG-Linux.deb`
  - curl -F "package[distro_version_id]=165" -F "package[package_file]=@$PKGNAME" https://$PKGCLOUD_TOKEN:@packagecloud.io/api/v1/repos/amoshi/alligator/packages.json

