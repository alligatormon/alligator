deploy_ubuntu2004:
  image: ubuntu:20.04
  only:
  - tags
  stage: build
  variables:
    DEBIAN_FRONTEND: noninteractive
    TZ: Etc/UTC
  script:
  - apt update
  - apt -y install git cmake make libtool rake python3-pip gcc g++ libsystemd-dev libudev-dev clang curl wget libyaml-0-2 pkg-config libvirt-dev smartmontools
  - apt -y install --only-upgrade m4
  - m4 --version
  - update-smart-drivedb --no-verify
  - git submodule sync --recursive
  - git submodule update --init --recursive
  - cd src

  - pip3 install conan==2.26.1
  - sed -i -e 's$libpq/17.7$libpq/15.5$g' conanfile.txt
  - conan profile detect --force
  - conan install . --build=missing
  - conan build external/
  - wget https://go.dev/dl/go1.22.1.linux-amd64.tar.gz
  - tar -C /usr/local -xzf go1.22.1.linux-amd64.tar.gz
  - ln -s /usr/local/go/bin/go /usr/bin/go

  - cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake -DCPACK_GENERATOR=DEB -DCMAKE_BUILD_TYPE=Release
  - cmake --build build  --parallel 3
  - cd build
  - cpack -G DEB

  - PKGNAME=`ls alligator-$CI_COMMIT_TAG-Linux.deb`
  - curl -F "package[distro_version_id]=210" -F "package[package_file]=@$PKGNAME" https://$PKGCLOUD_TOKEN:@packagecloud.io/api/v1/repos/amoshi/alligator/packages.json

