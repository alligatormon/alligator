apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "alligator.fullname" . }}
  labels:
    {{- include "alligator.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "alligator.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: {{ .Values.daemonset.updateStrategy }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "alligator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "alligator.serviceAccountName" . }}
      {{- if .Values.daemonset.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.daemonset.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alligator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.daemonset.args | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.config.entrypoint.port }}
              protocol: TCP
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ALLIGATOR_INSTANCE
              value: "$(POD_NAME).{{ include "alligator.fullname" . }}-headless.$(POD_NAMESPACE).svc.cluster.local:{{ .Values.service.headless.port }}"
            - name: ALLIGATOR__ENTRYPOINT0__INSTANCE
              value: "$(POD_NAME).{{ include "alligator.fullname" . }}-headless.$(POD_NAMESPACE).svc.cluster.local:{{ .Values.service.headless.port }}"
            {{- if .Values.cluster.enabled }}
            - name: ALLIGATOR_CLUSTER_NAME
              value: {{ .Values.cluster.name | quote }}
            - name: ALLIGATOR__ENTRYPOINT0__CLUSTER
              value: {{ .Values.cluster.name | quote }}
            {{- if .Values.cluster.dynamicPeers }}
            - name: ALLIGATOR_K8S_PEERS_SERVICE
              value: {{ include "alligator.fullname" . }}-headless
            - name: ALLIGATOR_K8S_PEERS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ALLIGATOR_K8S_PEERS_PORT
              value: {{ .Values.cluster.port | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/alligator
              readOnly: true
            - name: sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "alligator.fullname" . }}
        - name: sa-token
          projected:
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3600
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
